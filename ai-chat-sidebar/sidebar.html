<!DOCTYPE html>
<html>

<head>
  <title>智能助手</title>
  <meta charset="utf-8">
  <link rel="stylesheet" href="sidebar.css">
</head>

<body>
  <div class="sidebar-container">
    <!-- Floating Hamburger Button -->
    <button id="hamburgerButton" class="hamburger-btn" title="菜单">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
        <line x1="3" y1="6" x2="21" y2="6"></line>
        <line x1="3" y1="12" x2="21" y2="12"></line>
        <line x1="3" y1="18" x2="21" y2="18"></line>
      </svg>
    </button>

    <!-- Dropdown Menu -->
    <div id="hamburgerMenu" class="hamburger-menu" style="display: none;">
      <button id="menuSummarizePage" class="menu-item">
        <span class="menu-icon">📄</span>
        <span>总结当前网页</span>
      </button>
      <button id="menuExtractContent" class="menu-item">
        <span class="menu-icon">📋</span>
        <span>提取全文为引用</span>
      </button>
      <div class="menu-divider"></div>
      <button id="menuSplitChat" class="menu-item">
        <span class="menu-icon">✂️</span>
        <span>分割当前对话</span>
      </button>
      <button id="menuViewHistory" class="menu-item">
        <span class="menu-icon">🕐</span>
        <span>历史对话</span>
      </button>
      <button id="menuViewArchived" class="menu-item">
        <span class="menu-icon">🗂️</span>
        <span>查看已存档对话</span>
      </button>
      <button id="menuManagePrompts" class="menu-item">
        <span class="menu-icon">⚡</span>
        <span>管理 Prompt</span>
      </button>
      <div class="menu-divider"></div>
      <button id="menuClearHistory" class="menu-item menu-item-danger">
        <span class="menu-icon">🗑️</span>
        <span>清除所有历史</span>
      </button>
      <button id="menuSettings" class="menu-item">
        <span class="menu-icon">⚙️</span>
        <span>设置</span>
      </button>
    </div>

    <!-- Keep old elements hidden for JS compatibility -->
    <div class="controls-primary" style="display: none;">
      <button id="summarizePageButton">总结当前网页</button>
      <button id="extractContentButton">提取全文作为引用</button>
      <button id="toggleMoreActionsButton">⚙️</button>
    </div>
    <div id="moreActionsMenu" class="controls-secondary" style="display: none;">
      <button id="splitChatButton">分割当前对话</button>
      <button id="viewArchivedChatsButton">查看已存档对话</button>
      <button id="managePromptsButton">管理 Prompt</button>
    </div>
    <div class="prompt-shortcuts-container" style="display: none;">
      <h4 data-i18n="promptShortcuts">Prompt 快捷方式:</h4>
      <div id="promptShortcuts" class="prompt-shortcuts"></div>
    </div>

    <!-- History Panel -->
    <div id="historyPanel" class="history-panel" style="display:none;">
      <div class="history-panel-header">
        <span class="history-panel-title">历史对话</span>
        <button id="historyPanelClose" class="history-panel-close" title="关闭">×</button>
      </div>
      <div id="historyList" class="history-list"></div>
    </div>

    <div class="chat-area">
      <div id="chatOutput">
      </div>

      <div id="selectedImagePreviewContainer" style="display:none; margin-bottom: 5px; text-align: center;">
      </div>
      <button id="clearSelectedImageButton" data-i18n="clearImage"
        style="display: none; margin: 0 auto 8px auto; font-size: 0.8em; padding: 3px 8px; width: fit-content; background-color: var(--control-button-bg); color: var(--control-button-text); border: none; border-radius: var(--border-radius); cursor:pointer;">清除图片</button>


      <!-- Page context card -->
      <div id="pageContextCard" class="page-context-card" style="display: none;">
        <div class="page-context-info">
          <span class="page-context-title" id="pageContextTitle"></span>
        </div>
        <div class="page-context-actions">
          <button id="pageContextAsk" class="page-ctx-btn page-ctx-btn-outline">提问</button>
          <button id="pageContextSummarize" class="page-ctx-btn page-ctx-btn-filled">总结</button>
        </div>
        <button id="pageContextClose" class="page-context-close" title="关闭">×</button>
      </div>

      <!-- Floating input area -->
      <div class="input-float">
        <div id="attachedPageCard" style="display:none;" class="attached-page-card">
          <img id="attachedPageFavicon" class="attached-page-favicon" src="" alt="">
          <div class="attached-page-info">
            <span id="attachedPageTitle" class="attached-page-title"></span>
            <span id="attachedPageUrl" class="attached-page-url"></span>
          </div>
          <button id="attachedPageClose" class="attached-page-close" title="移除">×</button>
        </div>
        <div id="selectedTextCard" style="display:none;" class="selected-text-card">
          <div class="selected-text-icon">✂</div>
          <div class="selected-text-info">
            <span class="selected-text-label" data-i18n="quoteContent">引用内容</span>
            <span id="selectedTextContent" class="selected-text-content"></span>
          </div>
          <button id="clearSelectedTextButton" class="selected-text-close" title="清除">×</button>
        </div>
        <textarea id="chatInput" placeholder="有问题，尽管问"></textarea>
        <div class="send-area-container">
          <span class="shortcut-hint">Enter 发送 / Shift+Enter 换行</span>
          <button id="sendMessageButton" title="发送">
            <img src="icon/send.png" alt="发送" width="18" height="18">
          </button>
        </div>
      </div>
      <button id="clearAllHistoryButton" title="清除所有历史" style="display: none;">🗑️</button>
    </div>
  </div>
  <script src="/libs/marked.min.js"></script>
  <script src="sidebar.js"></script>
</body>

</html>
